services:
  - type: web
    name: forgeqr
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: BASE_URL
        value: https://forgeqr.onrender.com
      - key: ADMIN_KEY
        sync: false
